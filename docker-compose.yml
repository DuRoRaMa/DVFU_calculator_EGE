version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ege_postgres_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=pgdb
      - POSTGRES_USER=secret_user
      - POSTGRES_PASSWORD=very_secret_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secret_user -d pgdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ege_backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      - DB_NAME=pgdb
      - DB_USER=secret_user
      - DB_PASSWORD=very_secret_password
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_DEBUG=1
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  import_scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ege_import_scheduler
    restart: unless-stopped
    command: python manage.py run_import_scheduler
    environment:
      - DB_NAME=pgdb
      - DB_USER=secret_user
      - DB_PASSWORD=very_secret_password
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_DEBUG=1
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ege_frontend
    restart: unless-stopped
    command: npm start
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
